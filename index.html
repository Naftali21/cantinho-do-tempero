<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho do Tempero 🍳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .content {
            color: #555;
            line-height: 1.8;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .emojis {
            font-size: 3em;
            margin: 30px 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .footer {
            color: #999;
            font-size: 0.9em;
            margin-top: 40px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍳 Cantinho do Tempero</h1>
        <p class="subtitle">Bem-vindo ao seu espaço de culinária!</p>
        
        <div class="emojis">🌶️ 🧂 🧄 🥘 🍜</div>

        <div class="content">
            <p>Este é o seu cantinho especial para receitas, dicas culinárias e muito mais!</p>
            <p>Aqui você pode compartilhar suas criações e descobrir novos sabores.</p>
        </div>

        <a href="https://github.com/Naftali21/cantinho-do-tempero" class="button">Ver no GitHub</a>

        <div class="footer">
            <p>❤️ Feito com amor para os apaixonados por culinária</p>
        </div>
    </div>
</body>
</html>
